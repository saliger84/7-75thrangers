<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>7-75th Rangers | Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="calendar.css" />
</head>
<body>
  <div class="page-shell">
    <div class="camo-overlay"></div>

    <header class="site-header">
      <div class="container nav-inner">
        <a href="/" class="brand" aria-label="Go to homepage">
          <div class="brand-mark"></div>
          <span>7-75th Ranger Regiment</span>
        </a>

        <nav class="main-nav">
          <a href="#">Forum</a>
          <a href="#">About Us</a>
          <a href="#" class="active">Calendar</a>
          <a href="#">MILHQ</a>
        </nav>

        <div class="nav-user">
          <div class="brand-mark small"></div>
          <span>saliger</span>
        </div>
      </div>
    </header>

    <main class="container calendar-page">
      <section class="calendar-frame">
        <div class="toolbar">
          <div class="toolbar-left">
            <label class="sr-only" for="eventFilter">Filter events</label>
            <select class="toolbar-select" id="eventFilter">
              <option value="all">All Calendars</option>
              <option value="training">Training</option>
              <option value="operations">Operations</option>
              <option value="ceremony">Ceremony</option>
              <option value="meeting">Meetings</option>
              <option value="report">Reports</option>
            </select>
          </div>

          <div class="toolbar-right">
            <button class="toolbar-view active" id="monthViewBtn" type="button">Month</button>
            <button class="toolbar-view" id="weekViewBtn" type="button">Week</button>
          </div>
        </div>

        <div class="month-strip">
          <button class="nav-arrow" id="prevPeriod" aria-label="Previous period" type="button">←</button>
          <h1 id="monthLabel">March 2026</h1>
          <button class="nav-arrow" id="nextPeriod" aria-label="Next period" type="button">→</button>
        </div>

        <div class="calendar-grid" id="calendarGrid">
          <div class="weekday">MON</div>
          <div class="weekday">TUE</div>
          <div class="weekday">WED</div>
          <div class="weekday">THU</div>
          <div class="weekday">FRI</div>
          <div class="weekday">SAT</div>
          <div class="weekday">SUN</div>
        </div>
      </section>

      <div class="calendar-footer">
        Edit your events in <strong>events.json</strong> and upload it with these files.
      </div>
    </main>
  </div>

  <div class="modal-backdrop hidden" id="eventModalBackdrop"></div>
  <section class="event-modal hidden" id="eventModal" aria-hidden="true">
    <button class="modal-close" id="closeModal" type="button" aria-label="Close event details">×</button>
    <p class="modal-kicker" id="modalCategory">Event</p>
    <h2 id="modalTitle">Event Title</h2>
    <div class="modal-meta">
      <div><span>Date</span><strong id="modalDate">—</strong></div>
      <div><span>Time</span><strong id="modalTime">—</strong></div>
      <div><span>Location</span><strong id="modalLocation">—</strong></div>
      <div><span>Leader</span><strong id="modalLeader">—</strong></div>
    </div>
    <div class="modal-notes">
      <span>Notes</span>
      <p id="modalNotes">No additional notes.</p>
    </div>
  </section>

  <script src="calendar.js"></script>
</body>
</html>
